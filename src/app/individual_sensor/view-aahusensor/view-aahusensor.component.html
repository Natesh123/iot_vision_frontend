<ngx-header-column-layout >
        <router-outlet style="background-color: white;">
      <div class="row">
          <div class="col-xxxl-12 col-xxl-12 col-lg-12 col-md-12">
             
                <!-- Device Warning -->
                
              <span class="h1 location" style="text-align: center;font-size: 5.0rem">{{ deviceData.device_name }}
                  <!-- <nb-icon *ngIf="deviceData.device_min_temp > deviceData.device_temp || deviceData.device_max_temp < deviceData.device_temp
                    || deviceData.device_min_pressure > deviceData.device_pressure || deviceData.device_max_pressure < deviceData.device_pressure
                    || deviceData.device_min_humidity > deviceData.device_humidity || deviceData.device_max_humidity < deviceData.device_humidity"
                     class="icon-set" icon="alert-triangle-outline" status="danger"></nb-icon>  -->
              </span>
      
            
              <div class="weekly-forecast">
                <div class="day" style="padding-left: 0%;">
          
                  <span style="font-size: 15.0rem;margin-top: 18%" class="temperature">{{ deviceData.device_temp  |  number:'2.2-2' }}<span style="font-size: 6.8rem;">&deg;C</span></span>
                  <br>
                </div>
              </div>
                <div class="weekly-forecast">
                <div class="day" style="padding-left: 0%;">
                  <!-- <span class="caption heading-color">Humidity</span> -->
                  <!---->
                  <span style="font-size: 15.0rem;margin-top: 20%" class="temperature">{{ deviceData.device_humidity | number:'2.2-2' }}<span style="font-size: 6.8rem;">%</span></span>
                </div>
              </div>
             
                <div style="text-align: center;margin-top: 12%">
                    
                    <span style="font-size: 13.0rem"> {{ this.today | date:'H:mm:ss'}}</span>
                    <!-- <span class="span_color" style="font-size: 10.0rem"> {{ this.today | date:'dd-MM-yyyy'}}</span> -->
                </div>
           
            </div>
